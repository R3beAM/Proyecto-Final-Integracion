# Evidencia de inicialización conceptual de DVC para el proyecto.
# Este pipeline documenta cómo reproducir el entrenamiento cuando los datos reales
# estén versionados con `dvc add` y disponibles en las rutas declaradas.
stages:
  train_sentiment_models:
    desc: Entrena modelos de sentimiento y registra artefactos pickle en MLflow.
    cmd: >-
      python ../../mlflow_tracking/train_and_log_models.py
      --data ${data.processed_path}
      --text-column ${data.text_column}
      --target-column ${data.target_column}
      --experiment-name ${training.experiment_name}
      --tracking-uri ${training.tracking_uri}
      --pickle-dir ${training.pickle_dir}
      --test-size ${training.test_size}
      --random-state ${training.random_state}
    deps:
      - ../../mlflow_tracking/train_and_log_models.py
      - ${data.processed_path}
    params:
      - data.processed_path
      - data.text_column
      - data.target_column
      - training.experiment_name
      - training.tracking_uri
      - training.pickle_dir
      - training.test_size
      - training.random_state
      - models.baseline
      - models.comparison
    outs:
      - ${training.pickle_dir}
